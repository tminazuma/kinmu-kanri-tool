name: GitHub Pages へデプロイ

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: GitHub Pages を設定
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: src/ フォルダをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
